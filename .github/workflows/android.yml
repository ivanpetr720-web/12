name: Build PulseVPN APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Setup project
        run: |
          set -e
          mkdir -p app/src/main/java/com/pulsevpn/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper
          for f in AccountFragment.java AppState.java CustomServer.java HomeFragment.java MainActivity.java PaywallFragment.java Server.java ServerData.java ServersFragment.java; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/pulsevpn/app/ || true
          done
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
          for f in activity_main.xml fragment_home.xml fragment_servers.xml fragment_account.xml fragment_paywall.xml item_server.xml dialog_add_server.xml; do
            [ -f "$f" ] && mv "$f" app/src/main/res/layout/ || true
          done
          for f in colors.xml strings.xml themes.xml; do
            [ -f "$f" ] && mv "$f" app/src/main/res/values/ || true
          done
          for f in *.xml; do [ -f "$f" ] && mv "$f" app/src/main/res/drawable/ || true; done
          [ -f app_build.gradle ] && mv app_build.gradle app/build.gradle || true
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar"
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS
          printf '#!/bin/sh\nexec java -classpath "$(dirname $0)/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
          chmod +x gradlew
          echo "=== Checking structure ==="
          find . -not -path './.git/*' -type f | sort
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | head -150
      - uses: actions/upload-artifact@v4
        with:
          name: PulseVPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
