name: Build PulseVPN APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup project
        run: |
          mkdir -p app/src/main/java/com/pulsevpn/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper
          mv *.java app/src/main/java/com/pulsevpn/app/ 2>/dev/null||true
          mv AndroidManifest.xml app/src/main/ 2>/dev/null||true
          mv activity_main.xml fragment_home.xml fragment_servers.xml fragment_account.xml fragment_paywall.xml item_server.xml dialog_add_server.xml app/src/main/res/layout/ 2>/dev/null||true
          mv colors.xml strings.xml themes.xml app/src/main/res/values/ 2>/dev/null||true
          for f in *.xml; do [ -f "$f" ] && mv "$f" app/src/main/res/drawable/; done 2>/dev/null||true
          mv gradle-wrapper.properties gradle/wrapper/ 2>/dev/null||true
          mv app_build.gradle app/build.gradle 2>/dev/null||true
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: PulseVPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
