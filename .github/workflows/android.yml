name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Setup
        run: |
          mkdir -p app/src/main/java/com/pulsevpn/app app/src/main/res/layout app/src/main/res/values app/src/main/res/drawable gradle/wrapper
          mv *.java app/src/main/java/com/pulsevpn/app/ 2>/dev/null||true
          mv AndroidManifest.xml app/src/main/ 2>/dev/null||true
          for f in activity_main.xml fragment_home.xml fragment_servers.xml fragment_account.xml fragment_paywall.xml item_server.xml dialog_add_server.xml; do [ -f "$f" ] && mv "$f" app/src/main/res/layout/ || true; done
          for f in colors.xml strings.xml themes.xml; do [ -f "$f" ] && mv "$f" app/src/main/res/values/ || true; done
          for f in *.xml; do [ -f "$f" ] && mv "$f" app/src/main/res/drawable/ || true; done
          mv app_build.gradle app/build.gradle 2>/dev/null||true
          echo "plugins { id 'com.android.application' version '8.2.0' apply false }" > build.gradle
          printf "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\ndependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\nrootProject.name = 'PulseVPN'\ninclude ':app'" > settings.gradle
          printf "org.gradle.jvmargs=-Xmx2048m\nandroid.useAndroidX=true\nandroid.enableJetifier=true" > gradle.properties
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -cp "$(dirname $0)/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: PulseVPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
