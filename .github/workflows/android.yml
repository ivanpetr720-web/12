name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Setup
        run: |
          mkdir -p app/src/main/java/com/pulsevpn/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper
          mv *.java app/src/main/java/com/pulsevpn/app/ 2>/dev/null||true
          find . -maxdepth 1 -name "AndroidManifest.xml" -exec cp {} app/src/main/AndroidManifest.xml \;
          for f in activity_main.xml fragment_home.xml fragment_servers.xml fragment_account.xml fragment_paywall.xml item_server.xml dialog_add_server.xml; do [ -f "$f" ] && cp "$f" app/src/main/res/layout/ || true; done
          for f in colors.xml strings.xml themes.xml; do [ -f "$f" ] && cp "$f" app/src/main/res/values/ || true; done
          for f in bottom_nav_bg.xml btn_green.xml btn_proto_active.xml btn_proto_inactive.xml card_bg.xml card_selected.xml connect_btn_connected.xml connect_btn_normal.xml custom_card_bg.xml input_bg.xml paywall_feature_bg.xml plan_normal.xml plan_selected.xml premium_card_bg.xml smart_card_bg.xml; do [ -f "$f" ] && cp "$f" app/src/main/res/drawable/ || true; done
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -cp "$(dirname $0)/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
          chmod +x gradlew
          printf 'plugins {\n    id "com.android.application"\n}\nandroid {\n    namespace "com.pulsevpn.app"\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.pulsevpn.app"\n        minSdk 26\n        targetSdk 34\n        versionCode 1\n        versionName "1.0"\n    }\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n}\ndependencies {\n    implementation "androidx.appcompat:appcompat:1.6.1"\n    implementation "com.google.android.material:material:1.11.0"\n    implementation "androidx.constraintlayout:constraintlayout:2.1.4"\n}\n' > app/build.gradle
          printf 'plugins {\n    id "com.android.application" version "8.2.0" apply false\n}\n' > build.gradle
          printf 'pluginManagement {\n    repositories { google(); mavenCentral(); gradlePluginPortal() }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories { google(); mavenCentral() }\n}\nrootProject.name = "PulseVPN"\ninclude ":app"\n' > settings.gradle
          printf 'org.gradle.jvmargs=-Xmx2048m\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n' > gradle.properties
          echo "=== Manifest ===" && cat app/src/main/AndroidManifest.xml
          echo "=== Drawables ===" && ls app/src/main/res/drawable/
      - name: Build APK
        run: ./gradlew :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: PulseVPN-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
